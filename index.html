<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>

  <!-- Inline theme script: runs synchronously before CSS to prevent flash -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('pd_theme');
        if (saved === 'dark' || saved === 'light') {
          document.documentElement.dataset.theme = saved;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.dataset.theme = 'dark';
        } else {
          document.documentElement.dataset.theme = 'light';
        }
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <span class="logo">✦ Dashboard</span>
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme" title="Toggle light / dark mode">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="dashboard-grid">

    <!-- Greeting Widget -->
    <section id="greeting-widget" class="widget widget--greeting" aria-label="Greeting">
      <div class="greeting-time" id="greeting-time">00:00</div>
      <div class="greeting-date" id="greeting-date">Loading…</div>
      <div class="greeting-message" id="greeting-message">Hello</div>
      <div class="greeting-name-row">
        <input
          type="text"
          id="greeting-name-input"
          class="name-input"
          placeholder="Enter your name…"
          maxlength="40"
          aria-label="Your name"
        />
        <button id="greeting-name-save" class="btn btn--sm">Save</button>
        <button id="greeting-name-clear" class="btn btn--sm btn--ghost">Clear</button>
      </div>
    </section>

    <!-- Focus Timer Widget -->
    <section id="timer-widget" class="widget widget--timer" aria-label="Focus timer">
      <h2 class="widget-title">Focus Timer</h2>
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="timer-start" class="btn btn--primary">Start</button>
        <button id="timer-stop"  class="btn btn--secondary" disabled>Stop</button>
        <button id="timer-reset" class="btn btn--ghost">Reset</button>
      </div>
      <div class="timer-duration-row">
        <label for="timer-duration-input" class="label-sm">Duration (min)</label>
        <input
          type="number"
          id="timer-duration-input"
          class="duration-input"
          min="1"
          max="120"
          value="25"
          aria-label="Pomodoro duration in minutes"
        />
        <button id="timer-duration-save" class="btn btn--sm">Set</button>
      </div>
      <div id="timer-duration-error" class="error-msg" role="alert" aria-live="polite"></div>
      <div id="timer-notification" class="notification-banner" role="status" aria-live="polite" hidden></div>
    </section>

    <!-- To-Do List Widget -->
    <section id="todo-widget" class="widget widget--todo" aria-label="To-do list">
      <div class="widget-header">
        <h2 class="widget-title">Tasks</h2>
        <button id="todo-sort" class="btn btn--sm btn--ghost" title="Sort: incomplete first">⇅ Sort</button>
      </div>
      <form id="todo-form" class="add-form" novalidate>
        <input
          type="text"
          id="todo-input"
          class="text-input"
          placeholder="Add a task…"
          maxlength="200"
          aria-label="New task"
          autocomplete="off"
        />
        <button type="submit" class="btn btn--primary btn--sm">Add</button>
      </form>
      <div id="todo-error" class="error-msg" role="alert" aria-live="polite"></div>
      <ul id="todo-list" class="task-list" aria-label="Task list"></ul>
      <p id="todo-empty" class="empty-state" hidden>No tasks yet — add one above!</p>
    </section>

    <!-- Quick Links Widget -->
    <section id="links-widget" class="widget widget--links" aria-label="Quick links">
      <h2 class="widget-title">Quick Links</h2>
      <form id="links-form" class="add-form" novalidate>
        <input
          type="text"
          id="links-label-input"
          class="text-input"
          placeholder="Label"
          maxlength="60"
          aria-label="Link label"
          autocomplete="off"
        />
        <input
          type="url"
          id="links-url-input"
          class="text-input"
          placeholder="https://…"
          maxlength="500"
          aria-label="Link URL"
          autocomplete="off"
        />
        <button type="submit" class="btn btn--primary btn--sm">Add</button>
      </form>
      <div id="links-error" class="error-msg" role="alert" aria-live="polite"></div>
      <div id="links-list" class="links-grid" aria-label="Quick links list"></div>
      <p id="links-empty" class="empty-state" hidden>No links yet — add one above!</p>
    </section>

  </main>

  <!-- Storage unavailability banner (shown once per session if needed) -->
  <div id="storage-banner" class="storage-banner" role="alert" hidden>
    ⚠️ Local storage is unavailable. Your data won't be saved this session.
  </div>

  <script src="js/app.js"></script>
</body>
</html>
